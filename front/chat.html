<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>
    <link rel="stylesheet" href="/static/chat.css">
</head>
<body>
    <div class="loading" id="loading">Загрузка...</div>
    
    <div class="container" id="chatApp" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">?</div>
                    <div class="user-name" id="user-name">Пользователь</div>
                    <button id="logoutBtn" title="Выйти">Выйти</button>
                </div>
            </div>
            <div class="search-box" id="chatSearchBox">
                <div class="search-icon">🔍</div>
                <input 
                    type="text" 
                    placeholder="Поиск" 
                    id="universalSearchInput"
                    autocomplete="off"
                >
                <div class="clear-search" id="clearUniversalSearch" style="display: none;">✕</div>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>
        
        <div class="main-chat">
            <div class="chat-header">
                <div class="header-left">
                    <div class="current-avatar" id="current-avatar">?</div>
                    <div class="header-info">
                        <div class="current-chat-name" id="current-chat-name">Выберите чат</div>
                        <div class="online" id="online-status">---</div>
                    </div>
                </div>
                <div class="header-right">
                    <button id="deleteChatBtn" title="Удалить">Удалить</button>
                </div>
            </div>

            <div class="messages" id="messages-container">
                <div class="welcome-message">
                    <p>Выберите чат из списка слева, чтобы начать общение</p>
                </div>
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-wrapper">
                    <input type="text" placeholder="Написать сообщение..." id="message-input">
                    <button id="send-btn">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API_BASE = "";
    const loading = document.getElementById('loading');
    const chatApp = document.getElementById('chatApp');

    let chatsData = {};
    let currentChatId = null;
    let currentUserId = null;
    let currentUserName = null;
    
    // Для статусов
    let currentPartnerId = null;
    let statusCheckInterval = null;

    // ======================= ГЕНЕРАЦИЯ ЦВЕТА ПО ИМЕНИ =======================
    function getAvatarColor(name) {
        if (!name) return '#0088cc';
        
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        
        const colors = [
            '#0088cc', '#27ae60', '#e74c3c', '#9b59b6', '#f39c12',
            '#1abc9c', '#d35400', '#3498db', '#2ecc71', '#e67e22',
            '#16a085', '#8e44ad', '#2c3e50', '#f1c40f', '#7f8c8d'
        ];
        
        const index = Math.abs(hash) % colors.length;
        return colors[index];
    }

    // ======================= API ЗАПРОСЫ =======================
    function apiRequest(endpoint, options = {}) {
        const url = `${API_BASE}${endpoint}`; 
        const token = localStorage.getItem("ACCESS_TOKEN");
        
        const defaultOptions = {
            headers: {
                'Content-Type': 'application/json',
                ...options.headers
            },
            ...options
        };

        if (token) {
            defaultOptions.headers['Authorization'] = `Bearer ${token}`;
        }

        return fetch(url, defaultOptions)
            .then(response => {
                if (response.status === 401) {
                    localStorage.clear();
                    alert("Сессия истекла. Пожалуйста, войдите снова.");
                    window.location.href = "/";
                    return null;
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                return response.json();
            })
            .catch(error => {
                console.error(`Ошибка запроса ${endpoint}:`, error);
                throw error;
            });
    }

    // ======================= СТАТУСЫ ПОЛЬЗОВАТЕЛЕЙ =======================
    
    async function getUserStatus(userId) {
        try {
            const response = await apiRequest(`/user/${userId}/status`);
            return response;
        } catch (error) {
            console.error(`Ошибка получения статуса пользователя ${userId}:`, error);
            return null;
        }
    }
    
    async function updateMyStatus(isOnline) {
        try {
            const response = await apiRequest(`/user/status/update?is_online=${isOnline}`, {
                method: 'POST'
            });
            console.log('Статус обновлен:', response.message);
            return response;
        } catch (error) {
            console.error('Ошибка обновления статуса:', error);
        }
    }
    
    async function getChatPartnerId(chatId) {
        try {
            const response = await apiRequest(`/chat/${chatId}/partner_id`);
            return response.partner_id;
        } catch (error) {
            console.error(`Ошибка получения partner_id:`, error);
            return null;
        }
    }
    
    function formatExactTime(timestamp) {
        if (!timestamp) return 'никогда не был(а) в сети';
        
        // Если timestamp уже отформатирован сервером
        if (typeof timestamp === 'string') {
            // Проверяем, не содержит ли уже отформатированное время
            if (timestamp.includes('.') || timestamp.includes(':') || timestamp.includes('-')) {
                // Пробуем распарсить
                try {
                    const date = new Date(timestamp);
                    if (!isNaN(date.getTime())) {
                        // Успешно распарсили - форматируем
                        return formatSimpleDate(date);
                    }
                } catch (e) {
                    // Не смогли распарсить - возвращаем как есть
                    return timestamp;
                }
            }
        }
        
        // Пробуем создать дату
        try {
            const date = new Date(timestamp);
            if (isNaN(date.getTime())) {
                return 'время неизвестно';
            }
            return formatSimpleDate(date);
        } catch (e) {
            return 'время неизвестно';
        }
    }

    function formatSimpleDate(date) {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        
        const timeStr = date.toLocaleTimeString('ru-RU', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        });
        
        if (date >= today) {
            return `сегодня в ${timeStr}`;
        }
        
        if (date >= yesterday) {
            return `вчера в ${timeStr}`;
        }
        
        const dateStr = date.toLocaleDateString('ru-RU', {
            day: '2-digit',
            month: '2-digit',
            year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined
        });
        
        return `${dateStr} в ${timeStr}`;
    }
        
    async function updatePartnerStatus() {
        if (!currentChatId || !currentPartnerId) return;
        
         const status = await getUserStatus(currentPartnerId);
        const statusElement = document.getElementById('online-status');
        
        if (!status) {
            statusElement.textContent = 'статус неизвестен';
            statusElement.style.color = '#7f8c8d';
            return;
        }
        
        if (status.is_online) {
            statusElement.textContent = 'онлайн';
            statusElement.style.color = '#27ae60';
            statusElement.title = 'Сейчас онлайн';
        } else {
            const exactTime = formatExactTime(status.last_seen);
            statusElement.textContent = `был(а) ${exactTime}`;
            statusElement.style.color = '#7f8c8d';
            statusElement.title = `Был(а) в сети: ${exactTime}`;
        }
    }
    
    function markMeOnline() {
        if (!currentUserId) return;
        
        updateMyStatus(true);
        
        window.addEventListener('beforeunload', () => {
            updateMyStatus(false);
        });
    }

    // ======================= ИНИЦИАЛИЗАЦИЯ =======================
    function init() {
        console.log("Инициализация чата...");
        
        const token = localStorage.getItem("ACCESS_TOKEN");
        if (!token) {
            alert("Вы не авторизованы. Пожалуйста, войдите.");
            window.location.href = "/";
            return;
        }
        
        apiRequest('/auth/me')
            .then(userData => {
                if (!userData) return;
                
                currentUserId = userData.user.id;
                currentUserName = userData.user.first_name || "Пользователь";
                const userAvatar = currentUserName.charAt(0).toUpperCase();
                
                document.getElementById('user-name').textContent = currentUserName;
                document.getElementById('user-avatar').textContent = userAvatar;
                document.getElementById('user-avatar').style.backgroundColor = getAvatarColor(currentUserName);
                
                document.getElementById('deleteChatBtn').disabled = true;

                markMeOnline();
                
                return loadChats();
            })
            .then(() => {
                loading.style.display = 'none';
                chatApp.style.display = 'flex';
                
                setupEventListeners();
                
                console.log("Чат инициализирован");
            })
            .catch(error => {
                console.error("Ошибка инициализации:", error);
                alert("Ошибка авторизации. Пожалуйста, войдите снова.");
                window.location.href = "/";
            });
    }


    // ======================= ЗАГРУЗКА ЧАТОВ С СООБЩЕНИЯМИ =======================
    function loadChats() {
        console.log("Загрузка списка чатов...");
        
        return apiRequest('/chat/get_chats')
            .then(chats => {
                console.log("Получены чаты:", chats);
                
                chatsData = {};
                
                if (Array.isArray(chats) && chats.length > 0) {
                    const loadPromises = chats.map(chat => {
                        const chatId = chat.id;
                        const chatName = chat.title || `Чат ${chatId}`;
                        const avatarColor = getAvatarColor(chatName);
                        
                        // Сразу создаем объект чата
                        chatsData[chatId] = {
                            id: chatId,
                            name: chatName,
                            avatar: (chat.title || "Ч").charAt(0).toUpperCase(),
                            messages: [],
                            last_message: chat.last_message || "",
                            last_time: 'загрузка...',
                            last_message_raw: null,
                            serverId: chatId,
                            avatarColor: avatarColor
                        };
                        
                        // ЕСЛИ УЖЕ ЕСТЬ last_message из ответа сервера
                        if (chat.last_message && chat.last_message_timestamp) {
                            chatsData[chatId].last_message = chat.last_message;
                            chatsData[chatId].last_message_raw = chat.last_message_timestamp;
                            chatsData[chatId].last_time = formatChatTime(chat.last_message_timestamp);
                            return Promise.resolve(); // Уже есть данные
                        }
                        
                        // Загружаем последние сообщения для этого чата
                        return apiRequest(`/chat/${chatId}/messages?limit=1`)
                            .then(response => {
                                if (response && response.messages && response.messages.length > 0) {
                                    const lastMsg = response.messages[response.messages.length - 1];
                                    
                                    // Обновляем информацию о последнем сообщении
                                    chatsData[chatId].last_message = lastMsg.message || "";
                                    chatsData[chatId].last_message_raw = lastMsg.timestamp;
                                    chatsData[chatId].last_time = formatChatTime(lastMsg.timestamp);
                                    
                                    console.log(`Чат ${chatId}: последнее сообщение в ${lastMsg.timestamp}`);
                                } else {
                                    // Если нет сообщений
                                    chatsData[chatId].last_time = 'нет сообщений';
                                    chatsData[chatId].last_message_raw = null;
                                    console.log(`Чат ${chatId}: нет сообщений`);
                                }
                            })
                            .catch(error => {
                                console.error(`Ошибка загрузки сообщений для чата ${chatId}:`, error);
                                chatsData[chatId].last_time = 'ошибка';
                                chatsData[chatId].last_message_raw = null;
                            });
                    });
                    
                    // Ждем загрузки всех последних сообщений
                    return Promise.all(loadPromises)
                        .then(() => {
                            console.log("Все чаты загружены с последними сообщениями");
                            
                            // СОРТИРУЕМ чаты по времени последнего сообщения
                            const sortedChatIds = Object.keys(chatsData).sort((a, b) => {
                                const timeA = chatsData[a].last_message_raw ? 
                                    new Date(chatsData[a].last_message_raw).getTime() : 0;
                                const timeB = chatsData[b].last_message_raw ? 
                                    new Date(chatsData[b].last_message_raw).getTime() : 0;
                                
                                // Новые (большее время) вверху
                                return timeB - timeA;
                            });
                            
                            // Пересоздаем chatsData в правильном порядке
                            const sortedChatsData = {};
                            sortedChatIds.forEach(id => {
                                sortedChatsData[id] = chatsData[id];
                            });
                            chatsData = sortedChatsData;
                            
                            renderChatList();
                            
                            // Открываем сохраненный чат
                            const savedChatId = localStorage.getItem('LAST_OPENED_CHAT');
                            let chatToOpen = null;
                            
                            if (savedChatId && chatsData[savedChatId]) {
                                chatToOpen = savedChatId;
                                console.log("Восстанавливаем сохраненный чат:", savedChatId);
                            } else {
                                // Если нет сохраненного, открываем первый чат
                                chatToOpen = Object.keys(chatsData)[0];
                            }
                            
                            if (chatToOpen) {
                                setTimeout(() => loadChat(chatToOpen), 100);
                            }
                        });
                } else {
                    showNoChatsMessage();
                }
            })
            .catch(error => {
                console.error("Ошибка загрузки чатов:", error);
                showNoChatsMessage();
            });
    }

    // ======================= ЗАГРУЗКА ЧАТА =======================
    function loadChat(chatId) {
        const chat = chatsData[chatId];
        if (!chat) return;
        
        console.log("=== ЗАГРУЗКА ЧАТА ===");
        console.log("Чат:", chat.name);
        console.log("Текущее время в last_time:", chat.last_time);
        console.log("Текущее raw время:", chat.last_message_raw);
        
        currentChatId = chatId;
        localStorage.setItem('LAST_OPENED_CHAT', chatId);
        
        currentPartnerId = null;
        
        if (statusCheckInterval) {
            clearInterval(statusCheckInterval);
        }
        
        document.getElementById('current-avatar').textContent = chat.avatar;
        document.getElementById('current-avatar').style.backgroundColor = chat.avatarColor || '#0088cc';
        document.getElementById('current-chat-name').textContent = chat.name;
        document.getElementById('inputArea').style.display = 'block';
        document.getElementById('online-status').textContent = 'загружаем...';
        document.getElementById('online-status').style.color = '#7f8c8d';
        
        const deleteBtn = document.getElementById('deleteChatBtn')
        deleteBtn.disabled = false;
        deleteBtn.title = `Удалить чат "${chat.name}" для всех участников`;

        getChatPartnerId(chat.serverId)
            .then(partnerId => {
                if (partnerId) {
                    currentPartnerId = partnerId;
                    updatePartnerStatus();
                    statusCheckInterval = setInterval(updatePartnerStatus, 10000);
                } else {
                    document.getElementById('online-status').textContent = 
                        `сообщений: ${chat.messages.length}`;
                }
            })
            .catch(error => {
                console.error("Ошибка получения partnerId:", error);
                document.getElementById('online-status').textContent = 
                    `сообщений: ${chat.messages.length}`;
            });
        
        console.log(`Загружаем сообщения для чата ID: ${chat.serverId}`);
        
        apiRequest(`/chat/${chat.serverId}/messages?limit=50`)
            .then(response => {
                if (response && response.messages) {
                    chat.messages = response.messages.map(m => {
                        const senderName = m.sender ? 
                            (m.sender.first_name || m.sender.short_name || "Пользователь") : 
                            "Неизвестно";
                        
                        const avatarColor = chat.avatarColor || getAvatarColor(senderName);
                        
                        return {
                            id: m.id || Date.now(),
                            text: m.message || "",
                            time: m.timestamp ? formatTime(m.timestamp) : '--:--',
                            fromMe: m.sender && m.sender.id === currentUserId,
                            senderName: senderName,
                            avatarColor: avatarColor,
                            timestamp: m.timestamp,
                            readAt: m.read_at,
                            deliveredAt: m.delivered_at
                        };
                    });
                    
                    if (chat.messages.length > 0) {
                        const lastMsg = chat.messages[chat.messages.length - 1];
                        chat.last_message = lastMsg.text.length > 30 ? 
                            lastMsg.text.substring(0, 30) + "..." : lastMsg.text;
                        
                        if (lastMsg.timestamp) {
                            chat.last_time = formatChatTime(lastMsg.timestamp);
                            chat.last_message_raw = lastMsg.timestamp;
                        }
                    }
                    
                    if (!currentPartnerId) {
                        document.getElementById('online-status').textContent = 
                            `сообщений: ${chat.messages.length}`;
                    }
                } else {
                    chat.messages = [];
                    if (!currentPartnerId) {
                        document.getElementById('online-status').textContent = 'нет сообщений';
                    }
                }
                
                renderMessages(chatId);
                renderChatList();
            })
            .catch(error => {
                console.error(`Ошибка загрузки сообщений:`, error);
                chat.messages = [];
                if (!currentPartnerId) {
                    document.getElementById('online-status').textContent = 'ошибка загрузки';
                }
                renderMessages(chatId);
                renderChatList();
            });

    }

    // ======================= ПОИСК ПОЛЬЗОВАТЕЛЕЙ =======================
    let searchTimer = null;

    function searchUsers(query) {
        const chatList = document.getElementById('chatList');
        
        if (!query.trim()) {
            renderChatList();
            return;
        }
        
        chatList.innerHTML = '<div class="search-loading">Ищем...</div>';
        
        apiRequest(`/search/users?query=${encodeURIComponent(query)}`)
            .then(users => {
                if (!users || users.length === 0) {
                    chatList.innerHTML = '<div class="search-no-results">Ничего не нашли</div>';
                    return;
                }
                
                const otherUsers = users.filter(user => user.id !== currentUserId);
                
                if (otherUsers.length === 0) {
                    chatList.innerHTML = '<div class="search-no-results">Только вы подошли</div>';
                    return;
                }
                
                showFoundUsers(otherUsers);
            })
            .catch(error => {
                console.error("Ошибка поиска:", error);
                chatList.innerHTML = '<div class="search-no-results">Ошибка поиска</div>';
            });
    }

    function showFoundUsers(users) {
        const chatList = document.getElementById('chatList');
        chatList.innerHTML = '';
        
        users.forEach(user => {
            const userName = user.first_name || user.short_name || "Пользователь";
            const userPhone = user.phone || "Телефон не указан";
            const userAvatar = userName.charAt(0).toUpperCase();
            const avatarColor = getAvatarColor(userName);
            
            let existingChat = null;
            for (const chatId in chatsData) {
                const chat = chatsData[chatId];
                if (chat.name === userName || chat.name.includes(user.short_name)) {
                    existingChat = chat;
                    break;
                }
            }
            
            const userElement = document.createElement('div');
            userElement.className = 'user-search-result';
            
            const buttonSymbol = existingChat ? '→' : '+';
            const buttonClass = existingChat ? 'added' : '';
            const buttonTitle = existingChat ? 'Открыть существующий чат' : 'Создать новый чат';
            
            userElement.innerHTML = `
                <div class="user-search-avatar" style="background-color: ${avatarColor}">
                    ${userAvatar}
                </div>
                <div class="user-search-info">
                    <div class="user-search-name" title="${userName}">${userName}</div>
                    <div class="user-search-phone" title="${userPhone}">${userPhone}</div>
                </div>
                <button class="user-search-add-btn ${buttonClass}" 
                        data-user-id="${user.id}"
                        data-user-name="${userName}"
                        data-has-chat="${!!existingChat}"
                        title="${buttonTitle}">
                    ${buttonSymbol}
                </button>
            `;
            
            chatList.appendChild(userElement);
        });
    }

    function handleUserButtonClick(userId, userName, hasChat) {
        if (hasChat) {
            for (const chatId in chatsData) {
                const chat = chatsData[chatId];
                if (chat.name === userName) {
                    loadChat(chat.id);
                    clearSearch();
                    return;
                }
            }
        } else {
            createNewChatWithUser(userId, userName);
        }
    }

    function createNewChatWithUser(userId, userName) {
        const chatList = document.getElementById('chatList');
        chatList.innerHTML = '<div class="search-loading">Создаем чат...</div>';
        
        apiRequest('/chat/create_chat', {
            method: 'POST',
            body: JSON.stringify({
                creds: userId
            })
        })
        .then(newChat => {
            console.log("Создан чат:", newChat);
            
            const chatId = newChat.id;
            const chatName = newChat.title || userName;
            const avatarColor = getAvatarColor(chatName);
            
            chatsData[chatId] = {
                id: chatId,
                name: chatName,
                avatar: chatName.charAt(0).toUpperCase(),
                messages: [],
                last_message: "",
                last_time: "только что",
                serverId: chatId,
                avatarColor: avatarColor
            };
            
            clearSearch();
            renderChatList();
            
            setTimeout(() => {
                loadChat(chatId);
            }, 500);
            
        })
        .catch(error => {
            console.error("Не получилось создать чат:", error);
            alert(`Ошибка: ${error.message || "Не удалось создать чат"}`);
            renderChatList();
        });
    }

    function clearSearch() {
        document.getElementById('universalSearchInput').value = '';
        document.getElementById('clearUniversalSearch').style.display = 'none';
    }
    
    function setupSearchListeners() {
        const searchInput = document.getElementById('universalSearchInput');
        const clearBtn = document.getElementById('clearUniversalSearch');
        
        searchInput.addEventListener('input', (e) => {
            const hasText = e.target.value.length > 0;
            clearBtn.style.display = hasText ? 'block' : 'none';
            
            clearTimeout(searchTimer);
            
            searchTimer = setTimeout(() => {
                searchUsers(e.target.value);
            }, 400);
        });
        
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.style.display = 'none';
            renderChatList();
        });
        
        document.getElementById('chatList').addEventListener('click', (e) => {
            if (e.target.classList.contains('user-search-add-btn')) {
                const userId = e.target.dataset.userId;
                const userName = e.target.dataset.userName;
                const hasChat = e.target.dataset.hasChat === 'true';
                
                handleUserButtonClick(userId, userName, hasChat);
            }
        });
    }

    function showNoChatsMessage() {
        const chatList = document.getElementById('chatList');
        chatList.innerHTML = `
            <div class="no-chats">
                <p>У вас пока нет чатов</p>
                <p style="font-size: 14px; color: #666; margin-top: 10px;">
                    Начните новый диалог
                </p>
            </div>
        `;

        document.getElementById('deleteChatBtn').disabled = true;
    }
    
    function renderChatList() {
        const chatList = document.getElementById('chatList');
        const searchInput = document.getElementById('universalSearchInput');
        
        // Если идет поиск - не показываем обычные чаты
        if (searchInput && searchInput.value.trim()) {
            return;
        }
        
        // Если нет чатов
        if (Object.keys(chatsData).length === 0) {
            showNoChatsMessage();
            return;
        }
        
        chatList.innerHTML = '';
        
        const sortedChats = Object.values(chatsData).sort((a, b) => {
            const timeA = a.last_message_raw ? new Date(a.last_message_raw).getTime() : 0;
            const timeB = b.last_message_raw ? new Date(b.last_message_raw).getTime() :
                
            if (!timeA && !timeB) {
                return b.id - a.id; // Чат с большим ID (новый) вверху
            }
            
            if (!timeA) return 1;
            if (!timeB) return -1;
            
            return timeB - timeA;
        });
        
        // Показываем отсортированные чаты
        sortedChats.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
            div.dataset.chatId = chat.id;
            
            // Время последнего сообщения
            let timeDisplay = 'нет сообщений';
            if (chat.last_message_raw) {
                timeDisplay = formatChatTime(chat.last_message_raw);
            }
            
            div.innerHTML = `
                <div class="avatar" style="background-color: ${chat.avatarColor || '#0088cc'}">
                    ${chat.avatar}
                </div>
                <div class="chat-info">
                    <div class="chat-header">
                        <span class="chat-name">${chat.name}</span>
                        <span class="time">
                            ${timeDisplay}
                        </span>
                    </div>
                    <div class="last-message">
                        <span>${chat.last_message || 'Нет сообщений'}</span>
                    </div>
                </div>
            `;
            
            // При клике на чат - открываем его
            div.addEventListener('click', () => {
                if (chat.id !== currentChatId) {
                    loadChat(chat.id);
                }
            });
            
            chatList.appendChild(div);
        });
    }
    
    function renderMessages(chatId) {
        const chat = chatsData[chatId];
        const container = document.getElementById('messages-container');
        
        if (!chat || !chat.messages || chat.messages.length === 0) {
            container.innerHTML = '<div class="no-messages">Нет сообщений</div>';
            return;
        }
        
        container.innerHTML = '';
        
        const isPersonalChat = chat.name && !chat.name.includes('Чат');
        let currentDate = null;
        
        chat.messages.forEach(msg => {
            // Проверяем дату сообщения
            if (msg.timestamp) {
                const messageDate = new Date(msg.timestamp);
                const dateString = formatMessageDate(messageDate);
                
                // Если дата изменилась - добавляем разделитель
                if (dateString !== currentDate) {
                    currentDate = dateString;
                    
                    const dateDivider = document.createElement('div');
                    dateDivider.className = 'date-divider';
                    dateDivider.innerHTML = `<span>${dateString}</span>`;
                    container.appendChild(dateDivider);
                }
            }
            
            const div = document.createElement('div');
            div.className = `message ${msg.fromMe ? 'me' : 'friend'}`;
            div.dataset.messageId = msg.id;
            
            let statusIcon = '−';
            let statusTitle = 'Не прочитано';
            
            if (msg.fromMe) {
                if (msg.readAt) {
                    statusIcon = '+';
                    statusTitle = `Прочитано: ${formatDateTime(msg.readAt)}`;
                }
            }
            
            if (msg.fromMe) {
                div.innerHTML = `
                    <div class="message-content">
                        <div class="message-text">${msg.text || ""}</div>
                        <div class="message-time">
                            <span class="message-status" title="${statusTitle}">${statusIcon}</span>
                            ${formatTime(msg.timestamp)}
                        </div>
                    </div>
                `;
                
                const statusElement = div.querySelector('.message-status');
                if (statusElement) {
                    statusElement.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showMessageDetails(msg);
                    });
                }
            } else {
                if (isPersonalChat) {
                    div.innerHTML = `
                        <div class="message-content">
                            <div class="message-text">${msg.text || ""}</div>
                            <div class="message-time">${formatTime(msg.timestamp)}</div>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="message-content">
                            <div class="message-sender">${msg.senderName || "Неизвестно"}</div>
                            <div class="message-text">${msg.text || ""}</div>
                            <div class="message-time">${formatTime(msg.timestamp)}</div>
                        </div>
                    `;
                }
            }
            
            container.appendChild(div);
        });
        
        setTimeout(() => {
            container.scrollTop = container.scrollHeight;
        }, 100);
    }

    // ======================= ФУНКЦИИ ФОРМАТИРОВАНИЯ ВРЕМЕНИ =======================
    function formatTime(timestamp) {
        try {
            let timeStr = timestamp;
            if (timeStr && !timeStr.endsWith('Z') && timeStr.includes('T')) {
                timeStr += 'Z';
            }
            
            const date = new Date(timeStr);
            
            if (isNaN(date.getTime())) {
                throw new Error('Invalid date');
            }
            
            return date.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
        } catch (e) {
            console.error('Ошибка времени:', timestamp, e);
            return '--:--';
        }
    }

    function formatChatTime(timestamp) {
        if (!timestamp) return '';
        
        try {
            let timeStr = timestamp;
            if (timeStr && !timeStr.endsWith('Z') && timeStr.includes('T')) {
                timeStr += 'Z';
            }
            
            const date = new Date(timeStr);
            const now = new Date();
            
            // Сегодня - показываем время (14:30)
            if (date.toDateString() === now.toDateString()) {
                return date.toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
            }
            
            // Вчера
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.toDateString() === yesterday.toDateString()) {
                return 'вчера';
            }
            
            // На этой неделе
            const weekAgo = new Date(now);
            weekAgo.setDate(weekAgo.getDate() - 7);
            if (date > weekAgo) {
                const days = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];
                return days[date.getDay()];
            }
            
            // Старее недели - дата
            return date.toLocaleDateString([], {
                day: '2-digit',
                month: '2-digit'
            });
        } catch (e) {
            return '';
        }
    }

    function formatDateTime(dateString) {
        if (!dateString) return 'неизвестно';
        
        try {
            let timeStr = dateString;
            if (timeStr && !timeStr.endsWith('Z') && timeStr.includes('T')) {
                timeStr += 'Z';
            }
            
            const date = new Date(timeStr);
            
            if (isNaN(date.getTime())) {
                throw new Error('Invalid date');
            }
            
            return date.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit', 
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        } catch (e) {
            console.error('Ошибка полной даты:', dateString, e);
            return 'ошибка даты';
        }
    }

    // ======================= ФОРМАТИРОВАНИЕ ДАТЫ ДЛЯ СООБЩЕНИЙ =======================
    function formatMessageDate(date) {
        const now = new Date();
        
        const months = [
            'января', 'февраля', 'марта', 'апреля', 'мая', 'июня',
            'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'
        ];
        
        const day = date.getDate();
        const month = months[date.getMonth()];
        
        // Если сообщение в текущем году - только число и месяц
        if (date.getFullYear() === now.getFullYear()) {
            return `${day} ${month}`;
        }
        
        // Если сообщение в другом году - добавляем год
        return `${day} ${month} ${date.getFullYear()}`;
    }
        
    // ============================ УДАЛЕНИЕ ЧАТА ==============================
    function deleteCurrentChat() {
        if (!currentChatId) {
            alert("Сначала выберите чат для удаления");
            return;
        }
        
        const chat = chatsData[currentChatId];
        if (!chat) {
            alert("Чат не найден");
            return;
        }
        
        if (!confirm(`Удалить чат "${chat.name}"?\n\nЭто удалит чат для вас и вашего собеседника.\nВсе сообщения будут удалены безвозвратно.`)) {
            return;
        }
        
        const statusEl = document.getElementById('online-status');
        const originalText = statusEl.textContent;
        statusEl.textContent = 'Удаляем...';
        
        const deleteBtn = document.getElementById('deleteChatBtn');
        const originalBtnText = deleteBtn.textContent;
        deleteBtn.textContent = 'Удаление...';
        deleteBtn.disabled = true;
        
        apiRequest(`/chat/${currentChatId}/delete_for_all`, {
            method: 'DELETE'
        })
        .then(response => {
            console.log('Ответ сервера при удалении:', response);
            
            if (response && response.deleted) {
                alert(`Чат "${chat.name}" удалён${response.deleted_for_all ? ' для всех участников' : ''}`);
                
                delete chatsData[currentChatId];
                
                currentChatId = null;
                currentPartnerId = null;
                localStorage.removeItem('LAST_OPENED_CHAT');
                
                if (statusCheckInterval) {
                    clearInterval(statusCheckInterval);
                    statusCheckInterval = null;
                }
                
                document.getElementById('current-chat-name').textContent = 'Выберите чат';
                document.getElementById('current-avatar').textContent = '?';
                document.getElementById('current-avatar').style.backgroundColor = '';
                document.getElementById('online-status').textContent = '---';
                document.getElementById('inputArea').style.display = 'none';
                
                const messagesContainer = document.getElementById('messages-container');
                messagesContainer.innerHTML = 
                    '<div class="welcome-message"><p>Выберите чат из списка слева</p></div>';
                
                renderChatList();
                
                if (Object.keys(chatsData).length === 0) {
                    showNoChatsMessage();
                }
                
            } else {
                alert("Не удалось удалить чат");
            }
        })
        .catch(error => {
            console.error('Ошибка при удалении чата:', error);
            
            let errorMessage = 'Не удалось удалить чат';
            
            if (error.message.includes('404')) {
                errorMessage = 'Чат не найден';
            } else if (error.message.includes('403')) {
                errorMessage = 'У вас нет прав для удаления этого чата';
            } else if (error.message.includes('400')) {
                errorMessage = 'Можно удалять только личные чаты';
            }
            
            alert(errorMessage);
        })
        .finally(() => {
            statusEl.textContent = originalText;
            deleteBtn.textContent = originalBtnText;
            deleteBtn.disabled = true;
        });
    }
    
    function showMessageDetails(message) {
        let details = '';
        
        if (message.timestamp) {
            details += `<p><strong>Отправлено:</strong> ${formatDateTime(message.timestamp)}</p>`;
        }
        
        if (message.readAt) {
            details += `<p><strong>Прочитано:</strong> ${formatDateTime(message.readAt)}</p>`;
        } else {
            details += `<p><strong>Прочитано:</strong> еще не прочитано</p>`;
        }
        
        const modal = document.createElement('div');
        modal.className = 'message-details-modal';
        modal.innerHTML = `
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Информация о сообщении</h3>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="message-preview">
                        <p><strong>Текст:</strong> ${message.text || "(без текста)"}</p>
                    </div>
                    <div class="message-details">
                        ${details}
                    </div>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        modal.querySelector('.close-modal').addEventListener('click', () => {
            modal.remove();
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.remove();
            }
        });
    }

    function sendMessage() {
        if (!currentChatId) {
            alert("Выберите чат для отправки сообщения");
            return;
        }
        
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        
        if (!text) return;
        
        const chat = chatsData[currentChatId];
        const now = new Date();
        const nowISO = now.toISOString();
        
        const newMsg = {
            id: Date.now(),
            text: text,
            time: formatTime(nowISO),
            fromMe: true,
            timestamp: nowISO,
            readAt: null,
            deliveredAt: null,
            senderName: currentUserName
        };
        
        chat.messages.push(newMsg);
        chat.last_message = text.length > 30 ? text.substring(0, 30) + "..." : text;
        chat.last_time = formatChatTime(nowISO);
        chat.last_message_raw = nowISO;
        
        renderMessages(currentChatId);
        renderChatList();
        input.value = '';
        
        apiRequest('/messages/by_user', {
            method: 'POST',
            body: JSON.stringify({ 
                id_query: String(chat.serverId),
                content: text
            })
        })
        .then(response => {
            if (response) {
                console.log("Сообщение отправлено на сервер:", response);
                
                if (response.id) {
                    newMsg.id = response.id;
                }
                if (response.timestamp) {
                    newMsg.timestamp = response.timestamp;
                    newMsg.time = formatTime(response.timestamp);
                    chat.last_time = formatChatTime(response.timestamp);
                    chat.last_message_raw = response.timestamp;
                    
                    renderChatList();
                }
            }
        })
        .catch(error => {
            console.error("Ошибка отправки на сервер:", error);
            alert("Не удалось отправить сообщение. Проверьте консоль.");
        });
    }
    
    function logout() {
        if (confirm("Вы уверены, что хотите выйти?")) {
            updateMyStatus(false);
            
            if (statusCheckInterval) {
                clearInterval(statusCheckInterval);
            }
            
            localStorage.clear();
            window.location.href = "/";
        }
    }

    function setupEventListeners() {
        setupSearchListeners();
        document.getElementById('send-btn').addEventListener('click', sendMessage);
        
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('deleteChatBtn').addEventListener('click', deleteCurrentChat);
    }

    // ======================= ЗАПУСК =======================
    document.addEventListener('DOMContentLoaded', init);
    </script>
